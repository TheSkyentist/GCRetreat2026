[workspace]
authors = ["TheSkyentist <raphael.hviding@gmail.com>"]
channels = ["conda-forge"]
name = "test"
platforms = ["osx-arm64", "osx-64", "linux-64"]
version = "0.1.0"

[environments]
freethread = { features = ['freethread'] }
accel = { features = ['accel'] }

[tasks]
parallel = { cmd = "python parallel.py", default-environment = "freethread" }
sum = { cmd = "python sum.py", default-environment = "accel" }
matrix = { cmd = "python matrix.py", default-environment = "accel" }
batch = { cmd = "python batch.py", default-environment = "accel" }
all = [{ task = "parallel" }, { task = "sum" }, { task = "matrix" }, { task = "batch" }]


[feature.freethread.dependencies]
python-freethreading = ">=3.14.4,<4"

[feature.accel.dependencies]
jax = ">=0.9.2,<0.10"
numba = ">=0.65.0,<0.66"
python = ">=3.14.4,<3.15"
